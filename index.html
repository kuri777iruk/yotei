<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOTEI  ��t</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #F5F5F7;
      --card: #FFFFFF;
      --primary: #007AFF;
      --primary-lt: rgba(0,122,255,0.10);
      --primary-dk: #005EC5;
      --c-best:     #5856D6;
      --c-circle:   #34C759;
      --c-triangle: #FF9F0A;
      --c-cross:    #FF3B30;
      --c-success:  #34C759;
      --text:       #1D1D1F;
      --text-sub:   #6E6E73;
      --border:     #D2D2D7;
      --r: 14px;
      --shadow: 0 2px 22px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic Medium", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
    }

    /* Header */
    .header {
      background: rgba(255,255,255,0.82);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      height: 52px; padding: 0 18px;
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 17px; font-weight: 800; letter-spacing: 2px; color: var(--primary); }
    .header-back {
      border: none; background: none; color: var(--primary);
      font-size: 15px; font-family: inherit; font-weight: 500;
      cursor: pointer; padding: 6px 0; display: flex; align-items: center; gap: 4px;
    }
    .organizer-badge {
      font-size: 11px; font-weight: 700;
      background: rgba(88,86,214,.12); color: var(--c-best);
      padding: 3px 10px; border-radius: 20px; letter-spacing: .3px;
    }

    /* Layout */
    .container { max-width: 720px; margin: 0 auto; padding: 26px 16px 80px; }
    .card { background: var(--card); border-radius: var(--r); padding: 22px; box-shadow: var(--shadow); margin-bottom: 14px; }

    /* Typography */
    .page-title { font-size: 26px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 3px; }
    .page-sub   { font-size: 14px; color: var(--text-sub); margin-bottom: 22px; }
    .section-label {
      font-size: 12px; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase; color: var(--text-sub); margin-bottom: 10px;
    }

    /* Forms */
    .input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 15px; font-family: inherit; color: var(--text);
      background: white; transition: border-color .18s; outline: none;
    }
    .input:focus { border-color: var(--primary); }
    .input::placeholder { color: #c0c0c5; }
    .form-group { margin-bottom: 14px; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 20px; border-radius: 12px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; border: none; transition: all .14s;
    }
    .btn-full { width: 100%; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dk); }
    .btn-primary:active { transform: scale(.97); }
    .btn-ghost  { background: var(--primary-lt); color: var(--primary); }
    .btn-ghost:hover { background: rgba(0,122,255,.16); }
    .btn-success { background: var(--c-success); color: #fff; }
    .btn-success:hover { background: #28a745; }
    .btn-danger { background: rgba(255,59,48,.09); color: var(--c-cross); }
    .btn-danger:hover { background: rgba(255,59,48,.17); }
    .btn-sm { padding: 7px 13px; font-size: 13px; border-radius: 8px; }
    .btn-xs { padding: 5px 10px; font-size: 12px; border-radius: 7px; }
    .btn-confirm { background: linear-gradient(135deg, #5856D6, #007AFF); color: #fff; border-radius: 14px; }
    .btn-confirm:hover { opacity: .88; }

    /* Calendar */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-arrow {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: var(--primary-lt); color: var(--primary);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: background .14s;
    }
    .cal-arrow:hover { background: rgba(0,122,255,.17); }
    .cal-month-label { font-size: 16px; font-weight: 700; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-wd { text-align: center; font-size: 10px; font-weight: 700; color: var(--text-sub); padding: 5px 0; }
    .cal-wd:first-child { color: var(--c-cross); }
    .cal-wd:last-child  { color: var(--primary); }
    .cal-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 13px; cursor: pointer;
      transition: all .12s; position: relative; user-select: none;
    }
    .cal-day:not(.empty):not(.past):hover { background: var(--primary-lt); }
    .cal-day.selected { background: var(--primary) !important; color: #fff !important; font-weight: 700; }
    .cal-day.today:not(.selected) { font-weight: 800; color: var(--primary); }
    .cal-day.today:not(.selected)::after {
      content: ''; position: absolute; bottom: 2px; left: 50%;
      transform: translateX(-50%); width: 4px; height: 4px; background: var(--primary); border-radius: 50%;
    }
    .cal-day.sun:not(.selected) { color: var(--c-cross); }
    .cal-day.sat:not(.selected) { color: var(--primary); }
    .cal-day.past { color: var(--border); cursor: default; pointer-events: none; }
    .cal-day.empty { pointer-events: none; }

    /* Date tags */
    .date-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
    .date-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--primary-lt); color: var(--primary);
      padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background .12s;
    }
    .date-tag:hover { background: rgba(0,122,255,.16); }
    .date-tag .rm { font-size: 13px; opacity: .5; transition: opacity .1s; }
    .date-tag:hover .rm { opacity: 1; }
    .cnt-pill { font-size: 9px; background: var(--primary); color: #fff; border-radius: 8px; padding: 1px 5px; }

    /* Time config */
    .time-section { margin-top: 14px; border-top: 1px solid var(--bg); padding-top: 14px; }
    .time-date-box { background: var(--bg); border-radius: 10px; padding: 13px; margin-bottom: 8px; }
    .time-date-hdr { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .time-date-hdr.open { margin-bottom: 12px; }
    .time-date-name { font-size: 13px; font-weight: 700; }
    .time-chevron { font-size: 16px; color: var(--text-sub); transition: transform .2s; display: inline-block; }
    .time-chevron.open { transform: rotate(180deg); }
    .time-preset-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .time-preset-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 9px; background: white;
      border: 1.5px solid var(--border); cursor: pointer; transition: all .12s;
    }
    .time-preset-row.on { border-color: var(--primary); background: rgba(0,122,255,.06); }
    .time-preset-range { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
    .time-preset-label { font-size: 11px; color: var(--text-sub); }
    .time-check { font-size: 16px; color: var(--primary); opacity: 0; transition: opacity .12s; }
    .time-preset-row.on .time-check { opacity: 1; }
    .custom-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .t-input { width: 90px; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s; }
    .t-input:focus { border-color: var(--primary); }
    .added-times { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .time-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(52,199,89,.12); color: #1a7a38;
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .time-chip-rm { border: none; background: none; color: inherit; opacity: .55; cursor: pointer; font-size: 12px; padding: 0; line-height: 1; }
    .time-chip-rm:hover { opacity: 1; }

    /* 4-mark buttons */
    .mark-cell { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .mark-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid var(--border); background: #fff;
      font-size: 14px; cursor: pointer; font-weight: 700;
      display: flex; align-items: center; justify-content: center; transition: all .12s;
    }
    .mark-btn:hover { transform: scale(1.12); }
    .m-best     { border-color: rgba(88,86,214,.35); }
    .m-circle   { border-color: rgba(52,199,89,.4); }
    .m-triangle { border-color: rgba(255,159,10,.4); }
    .m-cross    { border-color: rgba(255,59,48,.35); }
    .m-best.on     { background: var(--c-best);     border-color: var(--c-best);     color: #fff; }
    .m-circle.on   { background: var(--c-circle);   border-color: var(--c-circle);   color: #fff; }
    .m-triangle.on { background: var(--c-triangle); border-color: var(--c-triangle); color: #fff; }
    .m-cross.on    { background: var(--c-cross);    border-color: var(--c-cross);    color: #fff; }

    /* Response / Summary tables */
    .grid-scroll { overflow-x: auto; margin: 0 -22px; padding: 0 22px; }
    .resp-table, .sum-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .resp-table th, .sum-table th {
      padding: 8px 5px; text-align: center;
      border-bottom: 1.5px solid var(--border); white-space: nowrap;
    }
    .resp-table th.name-col, .sum-table th.name-col { text-align: left; min-width: 80px; font-size: 11px; color: var(--text-sub); }
    .slot-col { min-width: 54px; }
    .slot-date { font-size: 11px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .slot-time { font-size: 9px; color: var(--text-sub); margin-top: 1px; }
    .resp-table td, .sum-table td { padding: 5px 3px; text-align: center; border-bottom: 1px solid var(--bg); }
    .resp-table td.name-cell, .sum-table td.name-cell { text-align: left; font-weight: 600; font-size: 12px; padding-left: 0; }
    .resp-table tr:last-child td, .sum-table tr:last-child td { border-bottom: none; }

    /* mark display */
    .md { font-size: 14px; font-weight: 700; }
    .md.db { color: var(--c-best); }
    .md.dc { color: var(--c-circle); }
    .md.dt { color: var(--c-triangle); }
    .md.dx { color: var(--c-cross); }

    /* Summary score row */
    .score-row td { background: var(--bg); border-top: 1.5px solid var(--border); font-weight: 700; padding: 8px 4px; }
    .score-badge { display: inline-block; padding: 2px 5px; border-radius: 8px; font-size: 10px; font-weight: 700; margin: 1px; }
    .sb-b { background: rgba(88,86,214,.12); color: var(--c-best); }
    .sb-c { background: rgba(52,199,89,.12); color: var(--c-circle); }
    .sb-t { background: rgba(255,159,10,.12); color: var(--c-triangle); }
    .sb-x { background: rgba(255,59,48,.10); color: var(--c-cross); }

    /* Best column */
    .best-th { position: relative; }
    .best-mark { display: block; font-size: 9px; background: var(--c-success); color: #fff; border-radius: 6px; padding: 1px 5px; margin: 2px auto 0; width: fit-content; }
    .best-td { background: rgba(52,199,89,.07) !important; }

    .col-confirm-btn {
      display: block; margin: 5px auto 0; padding: 3px 7px;
      background: linear-gradient(135deg, #5856D6, #007AFF);
      color: #fff; border: none; border-radius: 6px;
      font-size: 9px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: opacity .14s; white-space: nowrap;
    }
    .col-confirm-btn:hover { opacity: .82; }
    .confirmed-th-badge { display: block; font-size: 9px; background: var(--c-circle); color: #fff; border-radius: 6px; padding: 2px 6px; margin: 3px auto 0; width: fit-content; }

    /* Deadline banner */
    .deadline-banner {
      border-radius: 12px; padding: 13px 16px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .deadline-banner.active {
      background: rgba(0,122,255,.07); border: 1.5px solid rgba(0,122,255,.2);
    }
    .deadline-banner.urgent {
      background: rgba(255,159,10,.08); border: 1.5px solid rgba(255,159,10,.3);
    }
    .deadline-banner.expired {
      background: rgba(255,59,48,.07); border: 1.5px solid rgba(255,59,48,.25);
    }
    .dl-icon { font-size: 22px; flex-shrink: 0; }
    .dl-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 2px; }
    .dl-label.active  { color: var(--primary); }
    .dl-label.urgent  { color: var(--c-triangle); }
    .dl-label.expired { color: var(--c-cross); }
    .dl-value { font-size: 15px; font-weight: 700; }
    .dl-sub   { font-size: 11px; color: var(--text-sub); margin-top: 1px; }

    /* Locked page */
    .locked-page {
      text-align: center; padding: 60px 24px;
    }
    .locked-icon { font-size: 64px; margin-bottom: 16px; }
    .locked-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .locked-sub   { font-size: 14px; color: var(--text-sub); line-height: 1.65; margin-bottom: 20px; }
    .locked-detail {
      background: rgba(255,59,48,.07); border: 1.5px solid rgba(255,59,48,.2);
      border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
      font-size: 13px; color: var(--c-cross); font-weight: 600;
    }

    /* Event card */
    .ev-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .ev-title { font-size: 19px; font-weight: 700; }
    .ev-meta-row { display: flex; align-items: flex-start; gap: 14px; }
    .share-box { background: var(--bg); border-radius: 10px; padding: 11px 14px; display: flex; align-items: center; gap: 10px; }
    .share-url { flex: 1; font-size: 12px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: 10px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .legend-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0; }

    /* Google Calendar */
    .gcal-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 15px; border-radius: 10px; border: 1.5px solid var(--border);
      background: white; color: var(--text); font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; text-decoration: none; transition: all .14s;
    }
    .gcal-btn:hover { border-color: #4285F4; color: #4285F4; background: rgba(66,133,244,.06); }

    /* Response list */
    .resp-li { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--bg); }
    .resp-li:last-child { border-bottom: none; }
    .resp-li-name { font-weight: 600; font-size: 13px; }
    .resp-li-sub  { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

    /* Modals */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45); backdrop-filter: blur(4px);
      z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: #fff; border-radius: 20px;
      padding: 28px 24px; max-width: 460px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: modalIn .25s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes modalIn {
      from { opacity:0; transform:scale(.9) translateY(20px); }
      to   { opacity:1; transform:scale(1)  translateY(0); }
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub   { font-size: 13px; color: var(--text-sub); margin-bottom: 18px; line-height: 1.5; }
    .modal-slot-box {
      background: linear-gradient(135deg, rgba(88,86,214,.08), rgba(0,122,255,.08));
      border: 1.5px solid rgba(88,86,214,.25);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 18px; text-align: center;
    }
    .modal-slot-date { font-size: 20px; font-weight: 800; color: var(--c-best); }
    .modal-slot-time { font-size: 13px; color: var(--text-sub); margin-top: 3px; }
    .modal-recipients { margin-bottom: 18px; max-height: 200px; overflow-y: auto; }
    .modal-recipient { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--bg); font-size: 13px; }
    .modal-recipient:last-child { border-bottom: none; }
    .modal-recipient .rname  { font-weight: 600; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; }
    .modal-note { font-size: 11px; color: var(--text-sub); text-align: center; margin-top: 12px; line-height: 1.5; }

    /* Deadline expired notification modal */
    .notif-modal {
      background: #fff; border-radius: 20px;
      padding: 28px 24px; max-width: 400px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: modalIn .3s cubic-bezier(.34,1.56,.64,1);
      text-align: center;
    }
    .notif-icon { font-size: 48px; margin-bottom: 12px; }
    .notif-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .notif-sub   { font-size: 13px; color: var(--text-sub); margin-bottom: 20px; line-height: 1.6; }
    .notif-count {
      font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 4px;
    }
    .notif-count-label { font-size: 12px; color: var(--text-sub); margin-bottom: 20px; }
    .notif-actions { display: flex; flex-direction: column; gap: 10px; }

    /* Confirmed banner */
    .confirmed-banner {
      background: linear-gradient(135deg, rgba(52,199,89,.12), rgba(0,199,89,.05));
      border: 1.5px solid rgba(52,199,89,.35);
      border-radius: 12px; padding: 16px 18px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 14px;
    }
    .confirmed-icon { font-size: 28px; }
    .confirmed-label { font-size: 11px; font-weight: 600; color: var(--c-circle); letter-spacing: .3px; text-transform: uppercase; }
    .confirmed-date  { font-size: 18px; font-weight: 800; }
    .confirmed-time  { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

    /* Hero */
    .hero { text-align: center; padding: 52px 0 30px; }
    .hero-e { font-size: 60px; margin-bottom: 14px; }
    .hero h1 { font-size: 30px; font-weight: 800; letter-spacing: -.6px; margin-bottom: 10px; line-height: 1.25; }
    .hero p  { font-size: 15px; color: var(--text-sub); max-width: 340px; margin: 0 auto 28px; line-height: 1.65; }
    .feat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .feat-card { background: var(--card); border-radius: var(--r); padding: 18px 12px; text-align: center; box-shadow: var(--shadow); }
    .feat-e { font-size: 26px; margin-bottom: 7px; }
    .feat-t { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .feat-d { font-size: 11px; color: var(--text-sub); line-height: 1.5; }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: rgba(29,29,31,.88); color: #fff;
      padding: 10px 20px; border-radius: 24px;
      font-size: 14px; font-weight: 500; backdrop-filter: blur(12px);
      z-index: 999; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .divider { height: 1px; background: var(--bg); margin: 16px 0; }
    .empty-state { text-align: center; padding: 26px; color: var(--text-sub); font-size: 13px; }
    .fade-in { animation: fi .23s ease; }
    @keyframes fi { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* Loading state for buttons */
    .btn.loading { pointer-events:none; opacity:.65; position:relative; }
    .btn.loading::after { content:''; display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; margin-left:8px; vertical-align:middle; }
    .btn-ghost.loading::after { border-color:rgba(0,122,255,.3); border-top-color:var(--primary); }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Highlight row for organizer in locked view */
    .organizer-only-bar {
      background: rgba(88,86,214,.07); border: 1.5px solid rgba(88,86,214,.2);
      border-radius: 12px; padding: 14px 18px; margin-bottom: 14px;
    }
    .organizer-only-bar .org-label { font-size: 11px; font-weight: 700; color: var(--c-best); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }

    @media (max-width: 480px) {
      .container { padding: 18px 12px 80px; }
      .card { padding: 17px 13px; }
      .hero h1 { font-size: 24px; }
      .feat-d { display: none; }
      .modal, .notif-modal { padding: 22px 18px; }

function rSummaryGrid() {
  const slots=S.event.slots,resps=S.responses;
  //  ���+�	ng�����
  const availCounts = slots.map(s => resps.filter(r=>r.marks[s.id]==='�'||r.marks[s.id]==='�').length);
  const bestCounts  = slots.map(s => resps.filter(r=>r.marks[s.id]==='�').length);
  const maxAvail    = Math.max(...availCounts, 0);
  // ٹ� = availL␀' Kd ΂␀'n�n
  const bestSet = new Set();
  if(maxAvail > 0) {
    const maxBest = Math.max(...slots.filter((_,i)=>availCounts[i]===maxAvail).map((_,j)=>bestCounts[slots.findIndex((s,i)=>availCounts[i]===maxAvail&&j===slots.filter((_,k)=>availCounts[k]===maxAvail).indexOf(slots[i]))]));
    slots.forEach((s,i)=>{ if(availCounts[i]===maxAvail) bestSet.add(s.id); });
  }

  let thead=`<tr><th class="name-col"> </th>`;
  for(let i=0;i<slots.length;i++){
    const s=slots[i],isBest=bestSet.has(s.id),isConf=S.confirmedSlotId===s.id;
    thead+=`<th class="${isBest?'best-th':''}">
      <div class="slot-date">${s.dateLabel}</div>
      ${s.time?`<div class="slot-time">${s.time}</div>`:''}
      ${isConf?`<span class="confirmed-th-badge"> ��</span>`:''}
      ${isBest&&!isConf?`<span class="best-mark">�+� ٹ�</span>`:''}
      ${!isConf&&!S.confirmedSlotId?`<button class="col-confirm-btn" onclick="openConfirmModal('${s.id}')">Sn�g��</button>`:''}
    </th>`;
  }
  thead+=`</tr>`;

  let tbody='';
  for(const r of resps){
    tbody+=`<tr><td class="name-cell">${esc(r.name)}</td>`;
    for(let i=0;i<slots.length;i++){
      const s=slots[i],v=r.marks[s.id]||'',mk=MARK_MAP[v];
      tbody+=`<td class="${bestSet.has(s.id)?'best-td':''}"><span class="md ${mk?mk.dc:'dx'}">${v}</span></td>`;
    }
    tbody+=`</tr>`;
  }

  tbody+=`<tr class="score-row"><td class="name-cell" style="font-size:11px;color:var(--text-sub);">�</td>`;
  for(let i=0;i<slots.length;i++){
    const s=slots[i];const cnt={};
    MARKS.forEach(mk=>{cnt[mk.val]=resps.filter(r=>r.marks[s.id]===mk.val).length;});
    const ac=availCounts[i];
    tbody+=`<td class="${bestSet.has(s.id)?'best-td':''}">
      <div style="font-size:11px;font-weight:800;color:var(--primary);margin-bottom:3px;"> �${ac}�</div>
      <span class="score-badge sb-b">�${cnt['�']}</span>
      <span class="score-badge sb-c">�${cnt['�']}</span>
      <span class="score-badge sb-t">�${cnt['�']}</span>
      <span class="score-badge sb-x">�${cnt['�']}</span>
    </td>`;
  }
  tbody+=`</tr>`;

  return`<div class="grid-scroll"><table class="sum-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
}

async function initApp() {
  const urlEventId = getEventIdFromURL();

  if (urlEventId && _sb) {
    // Supabase K����� + �T���
    const ev = await dbLoadEvent(urlEventId);
    if (ev) {
      S.eventId = ev.id;
      S.event = { title: ev.title, memo: ev.memo, organizerEmail: ev.organizerEmail, deadline: ev.deadline, slots: ev.slots };
      S.confirmedSlotId = ev.confirmedSlotId || null;
      S.responses = await dbLoadResponses(urlEventId);
      // Sn�馶L;�K$�localStoragek2B�K	
      S.isOrganizer = localStorage.getItem('yotei_isOrganizer') === '1'
                      && localStorage.getItem('yotei_eventId') === urlEventId;
      S.view = 'respond';
      startDeadlineWatch();
      render();
      return;
    }
  }

  // թ���ï: localStorage K��C
  try {
    const ev = localStorage.getItem('yotei_event');
    if (!ev) { render(); return; }
    S.event = JSON.parse(ev);
    S.eventId = localStorage.getItem('yotei_eventId') || null;
    S.responses = JSON.parse(localStorage.getItem('yotei_responses') || '[]');
    S.isOrganizer = localStorage.getItem('yotei_isOrganizer') === '1';
    if (S.event) {
      S.view = 'confirm';
      startDeadlineWatch();
    }
  } catch(e) {}
  render();
}
